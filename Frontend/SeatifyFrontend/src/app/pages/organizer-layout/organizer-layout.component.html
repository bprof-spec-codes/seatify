<div class="dashboard-layout">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">
        <i class="bi bi-ticket-perforated"></i>
      </div>
      <span class="brand-text" routerLink="/landingpage">Seatify</span>
    </div>

    <a
      class="nav-item"
      routerLink="/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <i class="bi bi-grid"></i>
      <span>Dashboard</span>
    </a>

    <a
      class="nav-item"
      routerLink="/dashboard/venues"
      routerLinkActive="active"
    >
      <i class="bi bi-building"></i>
      <span>Venues</span>
    </a>

    <a
      class="nav-item"
      routerLink="/dashboard/events"
      routerLinkActive="active"
    >
      <i class="bi bi-calendar-event"></i>
      <span>Events</span>
    </a>

    <a
      class="nav-item"
      style="cursor: pointer;"
      (click)="checkinModal.openModal()"
    >
      <i class="bi bi-qr-code-scan"></i>
      <span>Ticket Check-In</span>
    </a>
  </aside>

  <section class="dashboard-content">
    <router-outlet></router-outlet>
  </section>

  <app-checkin-modal #checkinModal></app-checkin-modal>
</div>
