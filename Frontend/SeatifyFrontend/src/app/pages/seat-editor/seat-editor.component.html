<ng-container *ngIf="cell as selectedCell; else noCellSelected">
    <div class="seat-panel">
        <div class="tool-section-header">
            <h3 class="tool-section-title">Seat</h3>
            <p class="tool-section-subtitle">Edit the selected seat properties.</p>
        </div>

        <div class="seat-meta">
            <div class="seat-meta__item">
                <span>Row</span>
                <strong>{{ selectedCell.row }}</strong>
            </div>

            <div class="seat-meta__item">
                <span>Column</span>
                <strong>{{ selectedCell.column }}</strong>
            </div>
        </div>

        <form class="seat-form" [formGroup]="form" (ngSubmit)="submit()">
            <div class="form-section">
                <label for="seatLabel">Label</label>
                <input id="seatLabel" type="text" formControlName="seatLabel" [disabled]="disabled || isSaving" />

                <div class="field-error" *ngIf="seatLabelControl?.touched && seatLabelControl?.invalid">
                    <span *ngIf="seatLabelControl?.errors?.['maxlength']">
                        Label is too long.
                    </span>
                </div>
            </div>

            <div class="form-section">
                <label for="priceOverride">Price override</label>
                <input id="priceOverride" type="number" min="0" formControlName="priceOverride" [disabled]="disabled || isSaving" />

                <div class="field-error" *ngIf="priceOverrideControl?.touched && priceOverrideControl?.invalid">
                    <span *ngIf="priceOverrideControl?.errors?.['min']">
                        Price must be at least 0.
                    </span>
                    <span *ngIf="priceOverrideControl?.errors?.['max']">
                        Price is too high.
                    </span>
                </div>
            </div>

            <div class="form-section">
                <label>Seat type</label>

                <div class="segmented-control">
                    <button type="button" [class.active]="seatTypeControl?.value === seatType.Seat" [disabled]="disabled || isSaving"
                        (click)="setSeatType(seatType.Seat)">
                        Seat
                    </button>

                    <button type="button" [class.active]="seatTypeControl?.value === seatType.AccessibleSeat" [disabled]="disabled || isSaving"
                        (click)="setSeatType(seatType.AccessibleSeat)">
                        Accessible
                    </button>

                    <button type="button" [class.active]="seatTypeControl?.value === seatType.Aisle" [disabled]="disabled || isSaving"
                        (click)="setSeatType(seatType.Aisle)">
                        Aisle
                    </button>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn--primary"
                    [disabled]="!selectedCell.seatId || form.invalid || isSaving || disabled">
                    Save seat
                </button>
            </div>
        </form>
    </div>
</ng-container>

<ng-template #noCellSelected>
    <div class="panel-placeholder">
        No cell selected.
    </div>
</ng-template>
