<div class="auth-page">
    <div class="auth-card">
        <h1>Login</h1>
        <p class="auth-subtitle">Sign in to the organizer panel.</p>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-field">
                <label for="email">Email</label>
                <input id="email" type="email" formControlName="email" />

                <small class="field-error" *ngIf="f['email'].touched && f['email'].invalid">
                    Please enter a valid email address.
                </small>
            </div>

            <div class="form-field">
                <label for="password">Password</label>
                <input id="password" type="password" formControlName="password" />

                <small class="field-error" *ngIf="f['password'].touched && f['password'].invalid">
                    Password is required.
                </small>
            </div>

            <div class="form-error" *ngIf="errorMessage">
                {{ errorMessage }}
            </div>

            <button class="primary-button" type="submit" [disabled]="isSubmitting">
                {{ isSubmitting ? 'Signing in...' : 'Login' }}
            </button>
        </form>

        <button class="secondary-button" type="button" (click)="onDevLogin()" [disabled]="isSubmitting">
            Login as dev user
        </button>

        <p class="auth-footer">
            Don't have an account?
            <a routerLink="/register">Register</a>
        </p>
    </div>
</div>
