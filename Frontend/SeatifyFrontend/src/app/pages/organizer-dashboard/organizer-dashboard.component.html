<section class="dashboard-page">
  <header class="page-header">
    <div>
      <h1 class="page-title">Dashboard</h1>
      <p class="page-subtitle">Overview of your ticketing platform</p>
    </div>
  </header>

  <div class="overview-grid">
    <div class="surface-card stats-card">
      <div class="stats-icon">
        <i class="bi bi-calendar-event"></i>
      </div>

      <div class="stats-value">{{ activeEventsCount }}</div>
      <div class="stats-label">Active Events</div>
    </div>

    <div class="surface-card overview-panel top-panel"></div>
    <div class="surface-card overview-panel bottom-panel"></div>
  </div>
</section>
