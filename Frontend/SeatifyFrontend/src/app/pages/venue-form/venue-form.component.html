<div class="venue-form-page">
  <header class="form-header">
    <button type="button" class="back-button" (click)="back()" title="Go back to venues">
      <i class="bi bi-arrow-left"></i>
    </button>
    <div>
      <h1 class="page-title">{{ editMode ? 'Edit Venue' : 'Create New Venue' }}</h1>
      <p class="page-subtitle">Configure the physical location details for your audience</p>
    </div>
  </header>

  <form [formGroup]="venueForm" (ngSubmit)="onSubmit()" class="form-container">
    <article class="surface-card form-card">
      <div class="card-section">
        <h2 class="section-title">
          <i class="bi bi-info-circle"></i>
          General Information
        </h2>

        <div class="form-grid">
          <div class="form-field full-width">
            <label for="venueName">Venue Name *</label>
            <input 
              type="text" 
              id="venueName" 
              formControlName="venueName" 
              placeholder="e.g. Grand City Hall"
              [class.is-invalid]="venueForm.get('venueName')?.touched && venueForm.get('venueName')?.invalid"
            >
            <div class="invalid-feedback" *ngIf="venueForm.get('venueName')?.errors?.['required']">
              Name is required.
            </div>
          </div>

          <div class="form-field">
            <label for="venuePostalCode">Postal Code *</label>
            <input 
              type="text" 
              id="venuePostalCode" 
              formControlName="venuePostalCode" 
              placeholder="e.g. 1011"
              [class.is-invalid]="venueForm.get('venuePostalCode')?.touched && venueForm.get('venuePostalCode')?.invalid"
            >
          </div>

          <div class="form-field">
            <label for="venueCity">City *</label>
            <input 
              type="text" 
              id="venueCity" 
              formControlName="venueCity" 
              placeholder="e.g. Budapest"
              [class.is-invalid]="venueForm.get('venueCity')?.touched && venueForm.get('venueCity')?.invalid"
            >
          </div>

          <div class="form-field full-width">
            <label for="venueAddressLine">Address Line *</label>
            <input 
              type="text" 
              id="venueAddressLine" 
              formControlName="venueAddressLine" 
              placeholder="e.g. Kossuth Lajos tér 1-3."
              [class.is-invalid]="venueForm.get('venueAddressLine')?.touched && venueForm.get('venueAddressLine')?.invalid"
            >
            <div class="invalid-feedback" *ngIf="venueForm.get('venueAddressLine')?.errors?.['required']">
              Address is required.
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-outline-secondary action-button" (click)="back()">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary action-button" [disabled]="venueForm.invalid">
          <i class="bi bi-check-lg ms-0 me-2"></i>
          {{ editMode ? 'Update Venue' : 'Create Venue' }}
        </button>
      </div>
    </article>
  </form>
</div>
