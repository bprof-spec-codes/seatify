<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    @if (editMode$ | async)
                    {
                        <h2>Edit Venue</h2>
                    }
                    @else
                    {
                        <h2>Create Venue</h2>
                    }
                </div>
                <div class="card-body">
                    <form [formGroup]="venueForm" (ngSubmit)="onSubmit()">
                        <div class="form-group mb-3">
                            <label for="venueName" class="mb-1">Name*:</label>
                            <input type="text" class="form-control" id="venueName" formControlName="venueName" placeholder="Venue Name">
                        </div>
                        <div class="form-group mb-3">
                            <label for="venueCity" class="mb-1">City*:</label>
                            <input type="text" class="form-control" id="venueCity" formControlName="venueCity" placeholder="Venue City">
                        </div>
                        <div class="form-group mb-3">
                            <label for="venuePostalCode" class="mb-1">Postal Code*:</label>
                            <input type="text" class="form-control" id="venuePostalCode" formControlName="venuePostalCode" placeholder="Venue Postal Code">
                        </div>
                        <div class="form-group mb-3">
                            <label for="venueAddressLine" class="mb-1">Address Line*:</label>
                            <input type="text" class="form-control" id="venueAddressLine" formControlName="venueAddressLine" placeholder="Venue Address Line">
                        </div>
                        <div class="row">
                            <div class="col">
                                <button type="button" class="btn btn-secondary btn-custom" (click)="back()">Back</button>
                            </div>
                            <div class="col-auto">
                                <button type="submit" class="btn btn-success btn-custom">Save</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
