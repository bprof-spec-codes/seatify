<div class="modal-overlay" [class.is-open]="isOpen">
  <div class="confirm-modal surface-card">
    <div class="modal-header">
      <div>
        <h2 class="modal-title">Confirm Deletion</h2>
        <p class="modal-subtitle">Think twice before you proceed</p>
      </div>
      <button type="button" class="modal-close-button" (click)="onCancel()" aria-label="Close">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <div class="modal-content-body">
      <div class="warning-icon">
        <i class="bi bi-exclamation-triangle-fill"></i>
      </div>
      <div class="message-content">
        <p class="main-message">Are you sure you want to delete this?</p>
        <p class="item-name">"{{ item?.name || 'this item' }}"</p>
        <p class="sub-message">This action is permanent and cannot be undone. All related data will be lost.</p>
      </div>
    </div>

    <div class="modal-actions">
      <button type="button" class="btn btn-outline-secondary modal-action-button" (click)="onCancel()">
        Cancel
      </button>
      <button type="button" class="btn btn-danger modal-action-button" (click)="onConfirm()">
        Yes, Delete
      </button>
    </div>
  </div>
</div>
